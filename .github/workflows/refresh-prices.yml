name: Refresh Prices

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: self-hosted
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build app

      - name: Refresh market prices
        run: docker compose run --rm -e IDLE_MMO_SECRET_KEY_CLI app npm run refresh-prices -- --smart
        env:
          IDLE_MMO_SECRET_KEY_CLI: ${{ secrets.IDLE_MMO_SECRET_KEY_CLI }}

      - name: Commit updated prices
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/defaults.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m 'chore: refresh market prices'
            git pull --rebase
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build application
        if: steps.commit.outputs.changed == 'true'
        run: docker compose run --rm -e VITE_STATIC_MODE=true app npm run build

      - name: Setup Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
