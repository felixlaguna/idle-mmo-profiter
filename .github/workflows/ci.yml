name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the Docker image (ensures all dependencies are installed)
      - name: Build Docker image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: docker compose build app

      # Run all CI checks inside Docker containers using Make targets
      # The 'make ci' target runs: lint -> typecheck -> test-run -> build-app
      # All commands execute inside Docker, ensuring consistency with local development
      - name: Run CI checks
        run: make ci
